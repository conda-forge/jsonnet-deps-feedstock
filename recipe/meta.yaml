{% set name = "jsonnet-deps" %}
{% set version = "0.22.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  url: https://github.com/google/go-jsonnet/archive/v{{ version }}.tar.gz
  sha256: 9c463043a05c1e833c57136521e808ee8df192131f00c636235a2b54823d8c4c

build:
  number: 0
  script:
    - cd cmd/jsonnet-deps && go-licenses save . --save_path ../../library_licenses
    - go build -v -o $PREFIX/bin/jsonnet-deps  # [not win]
    - go install -v .  # [win]

requirements:
  build:
    - {{ compiler('go') }}
    - go-licenses

test:
  commands:
    - jsonnet-deps --help

about:
  home: https://github.com/google/go-jsonnet
  license: Apache-2.0
  license_file:
    - LICENSE
  summary: Jsonnet static dependency parser

extra:
  recipe-maintainers:
    - swenger
    - borchero
